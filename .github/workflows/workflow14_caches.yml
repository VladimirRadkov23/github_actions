# caches работа с кэшем
name: Fourteenth Workflow
on: workflow_dispatch

jobs:
  first-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # копируем репозиторий
      - name: Cache node_modules # кэщируем
        id: cache-step # задаём id чтобы вывести кэш
        uses: actions/cache@v3
        with: # передаём путь где хранится кэш
          path: ~/.npm
          key: "cache-file" # имя файла / ключ по которому будет искаться этот кэш
      - name: Cache node_modules # отображаем кэш по его id
        run: echo '${{ steps.cache-step.outputs }}'
      - name: Install node_modules # устанавливаем зависимости
        run: npm install

