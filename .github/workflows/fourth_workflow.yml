name: Fourth Workflow
on:
  # условие запуска: после завершения указанного здесь workflow (одного или массива из нескольких)
  workflow_run:
    workflows: [Third Workflow]
    types:
      - completed

jobs:
  success_command:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - run: echo "Success"
  failure_command:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - run: echo "Failed"
