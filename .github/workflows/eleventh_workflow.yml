name: Eleventh Workflow
on: [push] # список иветнов для запуска

env: # переменная файла
  WF_CUSTOM_VAR: WF 1
jobs:
  run-first-command:
    runs-on: ubuntu-latest
    env: # переменная джоба
      JOB_CUSTOM_VAR: JOB 1
    steps:
      - name: Vars
        env: # переменная шага
          STEP_CUSTOM_VAR: STEP 1
          WF_CUSTOM_VAR: WF 1 - STEP 2
        run: |
          echo $GITHUB_SHA
          echo ${{ github.ref }}
          echo $WF_CUSTOM_VAR # вывод переменной ранером
          echo '${{ env.WF_CUSTOM_VAR }}' # переменная генерируется на стороне гитхаба
          echo $JOB_CUSTOM_VAR 
          echo $STEP_CUSTOM_VAR
