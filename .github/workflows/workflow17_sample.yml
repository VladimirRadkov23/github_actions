# шаблон

name: Reusable Workflow
on:
  workflow_call:     # запускается другим workflow
    inputs:
      title:
        description: " Custom Title"
        type: string
        default: "Testing text title"
        required: false

jobs:
  console-log:
    runs-on: ubuntu-latest
    steps:
      - name: Print Title
        run: echo '${{ inputs.title }}'

