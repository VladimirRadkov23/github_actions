name: Eight Workflow
#on: [push, issues, pull_request] # список иветнов для запуска

on:
  workflow_dispatch: # передача параметров в ручной запуск
    inputs:
      titleCustom:
        description: Type the Title
        type: string
        required: true
        default: "Hello World"

      selectCustom:
        description: Select Value
        type: choice
        required: true
        options:
          - Value 1
          - Value 2
          - Value 3
        default: "Value 2"

      checkCustom:
        description: Checkbox
        type: boolean
        required: false


jobs:
  run-first-command:
    runs-on: ubuntu-latest
    steps:
      - name: Event Vars
        run:
          echo "Title ${{ inputs.titleCustom }}"
          echo "Title ${{ inputs.selectCustom }}"
          echo "Title ${{ inputs.checkCustom }}"
