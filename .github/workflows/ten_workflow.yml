name: Then Workflow
#on: [push, issues, pull_request] # список иветнов для запуска

on: [push]
run-name: "Display Context info" # задаем кастомный заголовок если хотим
jobs:
  run-first-command:
    runs-on: ubuntu-latest
    steps:
      - name: Context and Expression
        id: context-expression
        run: |
          echo " ${{ tojson(github) }}"
          echo " ${{ tojson(runner) }}"
          echo " ${{ tojson(job) }}"
          echo " ${{ tojson(steps) }}"
      - name: Show steps context
        run: echo '${{ tojson(steps) }}'

